name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "wrangler.toml"
      - ".github/workflows/deploy_worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler --log-level debug deploy --minify

      - name: Smoke test
        run: |
          echo "Waiting for propagation..."
          sleep 8
          WORKER_URL="https://slona-feed.kreizi-ch.workers.dev"
          echo "Testing: $WORKER_URL"
          HTTP_CODE=$(curl -s -o /tmp/worker_response.json -w "%{http_code}" \
            -H "Cache-Control: no-cache" "$WORKER_URL")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Response headers check:"
            curl -sI "$WORKER_URL" | grep -i -E "cache-control|x-fetched|content-type|access-control"
            echo "--- JSON timestamp ---"
            python3 -c "
          import json
          d = json.load(open('/tmp/worker_response.json'))
          print('timestamp :', d.get('timestamp'))
          print('BTC price :', d.get('spot', {}).get('BTCUSDT', {}).get('price', 'n/a'))
          print('BTC mktcap:', d.get('spot', {}).get('BTCUSDT', {}).get('market_cap', 'n/a'))
            "
          else
            echo "Non-200 response:"
            cat /tmp/worker_response.json
          fi
