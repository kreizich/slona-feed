name: Fetch Market Data

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch_market_data.py"
      - ".github/workflows/fetch_market_data.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history/ data/funding_rates.json \
                  data/open_interest.json data/long_short_ratio.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: market snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push origin ${{ github.ref_name }}
          fi
