name: Fetch Market Data

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch_market_data.py"
      - ".github/workflows/fetch_market_data.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test Binance connectivity
        run: |
          echo "=== ping ==="
          curl -sf "https://api.binance.com/api/v3/ping" && echo "SPOT OK" || echo "SPOT FAILED"
          curl -sf "https://fapi.binance.com/fapi/v1/ping" && echo "FAPI OK" || echo "FAPI FAILED"
          echo "=== BTCUSDT price ==="
          curl -sf "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT" || echo "price fetch failed"

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history/ data/funding_rates.json \
                  data/open_interest.json data/long_short_ratio.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: market snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in $((i*3))s..."
            sleep $((i*3))
          done
