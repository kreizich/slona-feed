name: Fetch Derivatives

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch_derivatives.py"
      - ".github/workflows/fetch_derivatives.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test connectivity
        run: |
          echo "=== OKX ==="
          curl -sf --max-time 8 "https://www.okx.com/api/v5/market/tickers?instType=SWAP" \
            -o /tmp/okx.json && python3 -c "
          import json; d=json.load(open('/tmp/okx.json'))
          syms=[t['instId'] for t in d.get('data',[]) if 'USDT-SWAP' in t.get('instId','')][:5]
          print('OKX OK —', len(d.get(\"data\",[])), 'instruments, sample:', syms)
          " || echo "OKX FAILED"
          echo "=== Gate.io ==="
          curl -sf --max-time 8 "https://api.gateio.ws/api/v4/futures/usdt/tickers?contract=BTC_USDT" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Gate.io OK — last:', d[0].get('last'))" \
            || echo "Gate.io FAILED"

      - name: Fetch derivatives data
        run: python scripts/fetch_derivatives.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/funding_rates.json data/open_interest.json \
                  data/long_short_ratio.json data/funding_history_*.json \
                  data/latest.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: derivatives snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in $((i*3))s..."
            sleep $((i*3))
          done
